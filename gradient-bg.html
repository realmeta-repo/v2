<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradient Background</title>
    <link rel="icon" type="image/png" href="/img/icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: #020c1b;
            overflow: hidden;
        }

        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: linear-gradient(135deg,
                    #020c1b 0%,
                    #042f2e 50%,
                    #020c1b 100%);
            background-size: 200% 200%;
            animation: shift 20s ease-in-out infinite alternate;
        }

        /* 
           Ida: azul → verde entra → azul
           Volta (alternate): azul → verde volta → azul
           Nunca tem salto, a cor desliza fluidamente.
        */
        @keyframes shift {
            0% {
                background-position: 0% 0%;
            }

            100% {
                background-position: 100% 100%;
            }
        }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            color: rgba(255, 255, 255, 0.9);
            font-family: 'Segoe UI', system-ui, sans-serif;
            text-align: center;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 300;
            letter-spacing: 0.1em;
        }

        p {
            margin-top: 1rem;
            font-size: 1rem;
            opacity: 0.45;
            max-width: 500px;
            line-height: 1.7;
        }
    </style>
</head>

<body>
    <div class="bg"></div>
    <div class="content">
        <h1>Blink Site</h1>
        <p>Degradê fluido e ultra-leve. Zero JS, zero seams.</p>
    </div>
</body>

</html>
